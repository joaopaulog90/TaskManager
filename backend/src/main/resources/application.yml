server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: taskmanager-api

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/task_manager}
    username: ${SPRING_DATASOURCE_USERNAME:task_user}
    password: ${SPRING_DATASOURCE_PASSWORD:task_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  jackson:
    time-zone: UTC

jwt:
  secret: ${JWT_SECRET:um-segredo-local-de-dev-minimo-32-chars-ok}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

admin-seed:
  nome: ${ADMIN_SEED_NOME:Administrador}
  email: ${ADMIN_SEED_EMAIL:admin@taskmanager.com}
  senha: ${ADMIN_SEED_SENHA:admin123}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level [%logger{36}] — %msg%n"
  level:
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
